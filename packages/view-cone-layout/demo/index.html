<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Cone Layout Demo</title>
<link rel="stylesheet" href="src/shared.css">
<style>
  #info { position:fixed;top:12px;left:12px;z-index:10;font-size:10px;color:var(--dim); }
  #overlap-log { position:fixed;bottom:12px;left:12px;z-index:10;font-size:10px;color:var(--dim);max-height:120px;overflow-y:auto; }
  #ops-log {
    position:fixed; top:12px; right:340px; z-index:10;
    font-size:10px; color:var(--dim); font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    max-width:300px; max-height:240px; overflow-y:auto;
    padding:8px 12px;
  }
  #ops-log .op-row { white-space: nowrap; line-height: 1.4; }
  #ops-log .op-name { color:#dfdfdf; }
  #ops-log .op-args { opacity:0.6; }
  #ops-log .op-time { opacity:0.4; }
  #ops-log .op-current { color:#6cdc8c; }

  /* Tweakpane glassmorphic theming — soft, airy, rounded */
  .tp-dfwv {
    width: 280px !important;
    top: 12px !important;
    right: 12px !important;
  }
  .tp-rotv {
    --tp-base-background-color: rgba(18, 20, 30, 0.55);

    --tp-button-background-color: rgba(255, 255, 255, 0.08);
    --tp-button-background-color-active: rgba(255, 255, 255, 0.20);
    --tp-button-background-color-focus: rgba(255, 255, 255, 0.16);
    --tp-button-background-color-hover: rgba(255, 255, 255, 0.13);
    --tp-button-foreground-color: #efefef;
    --tp-container-background-color: rgba(255, 255, 255, 0.05);
    --tp-container-background-color-active: rgba(255, 255, 255, 0.12);
    --tp-container-background-color-focus: rgba(255, 255, 255, 0.09);
    --tp-container-background-color-hover: rgba(255, 255, 255, 0.07);
    --tp-container-foreground-color: #dfdfdf;
    --tp-groove-foreground-color: rgba(255, 255, 255, 0.10);
    --tp-input-background-color: rgba(0, 0, 0, 0.25);
    --tp-input-background-color-active: rgba(0, 0, 0, 0.40);
    --tp-input-background-color-focus: rgba(0, 0, 0, 0.35);
    --tp-input-background-color-hover: rgba(0, 0, 0, 0.30);
    --tp-input-foreground-color: #efefef;
    --tp-label-foreground-color: rgba(223, 223, 223, 0.65);
    --tp-monitor-background-color: rgba(0, 0, 0, 0.25);
    --tp-monitor-foreground-color: #dfdfdf;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

  #scene-cam-preview {

  }
  #scene-cam-label {

  }
</style>
</head>
<body>
<div id="info" class="panel" style="padding:8px 12px">
  <div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px">View Cone Layout</div>
  <div id="stats"></div>
</div>
<div id="overlap-log" class="panel" style="padding:8px 12px"></div>
<div id="ops-log" class="panel"></div>
<div id="scene-cam-label" style="bottom:202px; width:320px;">Scene Camera View</div>
<canvas id="scene-cam-preview" width="640" height="384"></canvas>

<script type="module">
import * as THREE from 'three';
import { createStudioScene } from './src/studio-scene.js';
import { createGnomon } from './src/gnomon.js';
import { Pane } from 'tweakpane';

const { scene, camera, renderer, controls, grid, floor, setBackground } = createStudioScene({
  cameraPos: [0.05, 0.18, 0.55], target: [0, 0, -0.7], fov: 45,
  shadows: false, maxPolarAngle: Math.PI * 0.9,
});

// Soft, airy gradient backdrop with diffuse color blooms (egyptian-blue + warm orange).
// Rendered as scene.background so it shows behind the geometry.
function makeBackdrop() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 1024;
  const ctx = c.getContext('2d');
  // Base
  const base = ctx.createLinearGradient(0, 0, 0, 1024);
  base.addColorStop(0, '#0c1224');
  base.addColorStop(1, '#06080f');
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, 1024, 1024);
  // Color blooms (additive, soft)
  ctx.globalCompositeOperation = 'lighter';
  function bloom(x, y, r, hex, alpha) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, hex + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
    g.addColorStop(1, hex + '00');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 1024, 1024);
  }
  bloom(220, 720, 480, '#e85020', 0.22);   // warm bottom-left
  bloom(820, 250, 520, '#0e34a0', 0.30);   // cool top-right
  bloom(550, 550, 320, '#5f5980', 0.18);   // soft mid grape
  bloom(120, 180, 280, '#dfdfdf', 0.06);   // gentle highlight
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
scene.background = makeBackdrop();
if (grid) grid.visible = false;
if (floor) floor.visible = false;
const gnomon = createGnomon(camera, controls, { target: controls.target });

const RAD = Math.PI / 180;

// Camera intrinsics — mutable via GUI
// Scene camera intrinsics (Spectacles eye — NOT the orbit camera)
const cam = {
  near: 0.08,
  vFov: 30,      // Spectacles vertical FOV
  hFov: 50,      // Spectacles horizontal FOV
  aspect: 50/30,
  ppd: 30,       // Display angular resolution: pixels per degree (Spectacles ballpark)
};
let H_FOV = cam.hFov;
let V_FOV = cam.vFov;

// Orbit camera (what you view through) — separate from scene camera
let useOrtho = false;
let orthoCamera = null;

// Scene camera — fixed at origin, looking -Z, represents user's eye
const sceneCamera = new THREE.PerspectiveCamera(cam.vFov, cam.hFov / cam.vFov, cam.near, 10);
sceneCamera.position.set(0, 0, 0);
sceneCamera.lookAt(0, 0, -1);

// Preview renderer on the inset canvas
const previewCanvas = document.getElementById('scene-cam-preview');
const previewRenderer = new THREE.WebGLRenderer({ canvas: previewCanvas, antialias: true, alpha: true });
previewRenderer.setPixelRatio(devicePixelRatio);
previewRenderer.setSize(320, 192);
previewRenderer.setClearColor(0x0a0a0c, 1);

function updateSceneCamera() {
  sceneCamera.fov = cam.vFov;
  sceneCamera.aspect = cam.hFov / cam.vFov;
  sceneCamera.near = cam.near;
  sceneCamera.updateProjectionMatrix();
}

// ─── Depth ruler — labeled cm graduation along -Z axis ───────────────
const rulerGroup = new THREE.Group();
scene.add(rulerGroup);

function buildDepthRuler(maxDepth) {
  while (rulerGroup.children.length) {
    const c = rulerGroup.children[0];
    rulerGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) {
      if (c.material.map) c.material.map.dispose();
      c.material.dispose();
    }
  }

  const baseY = -0.12;
  const spineColor = 0x5f5980;
  const tickColor = 0xdfdfdf;

  // Spine
  const spineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, baseY, 0),
    new THREE.Vector3(0, baseY, -maxDepth),
  ]);
  rulerGroup.add(new THREE.Line(
    spineGeo,
    new THREE.LineBasicMaterial({ color: spineColor, opacity: 0.55, transparent: true })
  ));

  // Tick segments + labels at every 25 cm
  const tickPoints = [];
  const maxCm = Math.floor(maxDepth * 100);
  for (let cm = 25; cm <= maxCm; cm += 25) {
    const z = -cm / 100;
    const isMajor = cm % 100 === 0;
    const tickH = isMajor ? 0.030 : 0.014;
    tickPoints.push(new THREE.Vector3(0, baseY, z), new THREE.Vector3(0, baseY - tickH, z));

    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = isMajor ? '#dfdfdf' : '#9994a8';
    ctx.font = `${isMajor ? 'bold ' : ''}20px Inter, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`${cm} cm`, 64, 22);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: tex, transparent: true, depthWrite: false, opacity: isMajor ? 1.0 : 0.7,
    }));
    sprite.position.set(0, baseY - tickH - 0.022, z);
    sprite.scale.set(0.085, 0.022, 1);
    rulerGroup.add(sprite);
  }
  const tickGeo = new THREE.BufferGeometry().setFromPoints(tickPoints);
  rulerGroup.add(new THREE.LineSegments(
    tickGeo,
    new THREE.LineBasicMaterial({ color: tickColor, opacity: 0.7, transparent: true })
  ));
}

// ─── Cone border outline — projected quad edges from camera ──────────
const coneMat = new THREE.LineBasicMaterial({ color: 0x0e34a0, transparent: true, opacity: 0.25 });
const coneGroup = new THREE.Group();
scene.add(coneGroup);

function buildConeOutlines(depth) {
  while (coneGroup.children.length) coneGroup.remove(coneGroup.children[0]);

  const hHalf = H_FOV / 2 * RAD;
  const vHalf = V_FOV / 2 * RAD;

  // Outer frustum border at depth
  const w = Math.tan(hHalf) * depth;
  const h = Math.tan(vHalf) * depth;
  const corners = [
    new THREE.Vector3(-w, h, -depth),
    new THREE.Vector3(w, h, -depth),
    new THREE.Vector3(w, -h, -depth),
    new THREE.Vector3(-w, -h, -depth),
  ];

  // Outer rect
  const outerGeo = new THREE.BufferGeometry().setFromPoints([...corners, corners[0]]);
  coneGroup.add(new THREE.Line(outerGeo, coneMat));

  // Near plane quad
  const nw = Math.tan(hHalf) * NEAR_PLANE;
  const nh = Math.tan(vHalf) * NEAR_PLANE;
  const nearCorners = [
    new THREE.Vector3(-nw, nh, -NEAR_PLANE),
    new THREE.Vector3(nw, nh, -NEAR_PLANE),
    new THREE.Vector3(nw, -nh, -NEAR_PLANE),
    new THREE.Vector3(-nw, -nh, -NEAR_PLANE),
  ];
  const nearGeo = new THREE.BufferGeometry().setFromPoints([...nearCorners, nearCorners[0]]);
  coneGroup.add(new THREE.Line(nearGeo, new THREE.LineBasicMaterial({ color: 0x0e34a0, opacity: 0.5, transparent: true })));
  // Near plane filled
  const nearFillGeo = new THREE.PlaneGeometry(nw * 2, nh * 2);
  const nearFill = new THREE.Mesh(nearFillGeo, new THREE.MeshBasicMaterial({
    color: 0x0e34a0, transparent: true, opacity: 0.04, side: THREE.DoubleSide, depthWrite: false,
  }));
  nearFill.position.set(0, 0, -NEAR_PLANE);
  coneGroup.add(nearFill);

  // Rays from near plane corners to far plane corners
  for (let i = 0; i < 4; i++) {
    const rayGeo = new THREE.BufferGeometry().setFromPoints([nearCorners[i], corners[i]]);
    coneGroup.add(new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0x0e34a0, transparent: true, opacity: 0.1 })));
  }

  // 3x3 sector grid lines
  const gridMat = new THREE.LineBasicMaterial({ color: 0x0e34a0, transparent: true, opacity: 0.12 });
  for (let i = 1; i < 3; i++) {
    const f = -1 + (2 * i / 3);
    // Vertical grid line
    const vGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(w * f, h, -depth),
      new THREE.Vector3(w * f, -h, -depth),
    ]);
    coneGroup.add(new THREE.Line(vGeo, gridMat));
    // Horizontal grid line
    const hGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-w, h * f, -depth),
      new THREE.Vector3(w, h * f, -depth),
    ]);
    coneGroup.add(new THREE.Line(hGeo, gridMat));
  }

  return { w, h };
}

// ─── Sector highlight quads ──────────────────────────────────────────
const SECTOR_NAMES = [
  "TOP-LEFT", "TOP", "TOP-RIGHT",
  "LEFT", "CENTER", "RIGHT",
  "BOT-LEFT", "BOTTOM", "BOT-RIGHT",
];

const sectorMeshes = {};
let NEAR_PLANE = cam.near;

function buildSectorFrustum(name, row, col, farDepth) {
  if (sectorMeshes[name]) { scene.remove(sectorMeshes[name]); sectorMeshes[name].geometry.dispose(); }

  const hHalf = H_FOV / 2 * RAD;
  const vHalf = V_FOV / 2 * RAD;
  const tanH = Math.tan(hHalf);
  const tanV = Math.tan(vHalf);

  // Angular bounds for this sector (normalized column/row to tan-space)
  const azMin = (-1 + col * 2/3) * tanH;
  const azMax = (-1 + (col+1) * 2/3) * tanH;
  const elMax = (1 - row * 2/3) * tanV;
  const elMin = (1 - (row+1) * 2/3) * tanV;

  // 8 corners: 4 on near plane, 4 on far plane (truncated — not from origin)
  const verts = [];
  for (const d of [NEAR_PLANE, farDepth]) {
    verts.push(
      new THREE.Vector3(azMin * d, elMax * d, -d),
      new THREE.Vector3(azMax * d, elMax * d, -d),
      new THREE.Vector3(azMax * d, elMin * d, -d),
      new THREE.Vector3(azMin * d, elMin * d, -d),
    );
  }

  const positions = [];
  function tri(a, b, c) { positions.push(a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z); }
  // Near face
  tri(verts[0], verts[1], verts[2]); tri(verts[0], verts[2], verts[3]);
  // Far face
  tri(verts[4], verts[6], verts[5]); tri(verts[4], verts[7], verts[6]);
  // Top
  tri(verts[0], verts[5], verts[1]); tri(verts[0], verts[4], verts[5]);
  // Bottom
  tri(verts[3], verts[2], verts[6]); tri(verts[3], verts[6], verts[7]);
  // Left
  tri(verts[0], verts[3], verts[7]); tri(verts[0], verts[7], verts[4]);
  // Right
  tri(verts[1], verts[5], verts[6]); tri(verts[1], verts[6], verts[2]);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.MeshBasicMaterial({
    color: 0xe03020, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  sectorMeshes[name] = mesh;
}

function buildAllSectors(defaultDepth) {
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      buildSectorFrustum(SECTOR_NAMES[row * 3 + col], row, col, defaultDepth);
    }
  }
}

// ─── Panel elements (draggable boxes) ────────────────────────────────
const panels = [];
// Palette: alabaster-grey, twilight-indigo, dusty-grape, egyptian-blue
const panelColors = [0xdfdfdf, 0x2f3061, 0x5f5980, 0x0e34a0];
const panelNames = ["PANEL A", "PANEL B", "PANEL C", "PANEL D"];

const DEPTHS = { near: 0.4, mid: 0.65, far: 1.0 };

// ─── Text measurement + shrinkwrap ───────────────────────────────────
// Convert world meters ↔ canvas pixels at a fixed pixel density.
// 1280 px/m means 1 cm world == 12.8 px on the label canvas. This keeps
// rendered text crisp regardless of the wrapped line count.
const LABEL_PPM = 1280;

const _measureCanvas = document.createElement('canvas');
const _measureCtx = _measureCanvas.getContext('2d');

/**
 * Greedy word-wrap + bounding-box measurement using canvas.measureText().
 * Returns { lines, widthPx, heightPx, lineHeightPx }.
 */
function measureTextLines(text, fontPx, maxWidthPx = Infinity) {
  _measureCtx.font = `bold ${fontPx}px Inter, sans-serif`;
  const lineHeightPx = fontPx * 1.2;
  const finalLines = [];

  for (const inputLine of text.split('\n')) {
    const words = inputLine.split(' ');
    let cur = '';
    for (const word of words) {
      const trial = cur ? cur + ' ' + word : word;
      if (_measureCtx.measureText(trial).width > maxWidthPx && cur) {
        finalLines.push(cur);
        cur = word;
      } else {
        cur = trial;
      }
    }
    if (cur || inputLine === '') finalLines.push(cur);
  }

  let widthPx = 0;
  for (const line of finalLines) {
    widthPx = Math.max(widthPx, _measureCtx.measureText(line).width);
  }
  return {
    lines: finalLines,
    widthPx: Math.ceil(widthPx),
    heightPx: Math.ceil(finalLines.length * lineHeightPx),
    lineHeightPx,
  };
}

/**
 * Render measured text to a canvas at supersampled resolution.
 * Returns { canvas, widthPx, heightPx } where the dims match `measure`.
 */
function renderTextCanvas(measure, fontPx, color = '#ffffff') {
  const SS = 2;  // supersample factor for sharp glyphs at any scale
  const canvas = document.createElement('canvas');
  canvas.width = measure.widthPx * SS;
  canvas.height = measure.heightPx * SS;
  const ctx = canvas.getContext('2d');
  ctx.scale(SS, SS);
  ctx.fillStyle = color;
  ctx.font = `bold ${fontPx}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < measure.lines.length; i++) {
    ctx.fillText(measure.lines[i], measure.widthPx / 2, (i + 0.5) * measure.lineHeightPx);
  }
  return { canvas, widthPx: measure.widthPx, heightPx: measure.heightPx };
}

// Rounded rectangle helpers. Used everywhere panel face/border geometry is rebuilt.
const PANEL_CORNER_R = 0.006;   // 6mm corner radius — tasteful, scales with frame
function roundedRectShape(w, h, r) {
  const rr = Math.max(0.001, Math.min(r, w * 0.45, h * 0.45));
  const x = -w / 2, y = -h / 2;
  const s = new THREE.Shape();
  s.moveTo(x + rr, y);
  s.lineTo(x + w - rr, y);
  s.quadraticCurveTo(x + w, y, x + w, y + rr);
  s.lineTo(x + w, y + h - rr);
  s.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  s.lineTo(x + rr, y + h);
  s.quadraticCurveTo(x, y + h, x, y + h - rr);
  s.lineTo(x, y + rr);
  s.quadraticCurveTo(x, y, x + rr, y);
  return s;
}
function rebuildFaceAndBorder(panel) {
  const shape = roundedRectShape(panel.w, panel.h, PANEL_CORNER_R);
  panel.face.geometry.dispose();
  panel.face.geometry = new THREE.ShapeGeometry(shape);
  panel.border.geometry.dispose();
  panel.border.geometry = new THREE.BufferGeometry().setFromPoints(shape.getPoints(48));
}

function createPanel({
  name, text, x, y, z, color,
  fontPx = 28,
  paddingCm = 1.5,             // padding around text (cm world)
  maxWidthCm = 25,             // wrap width (cm world)
}) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  scene.add(group);

  // Solid face — rounded shape rebuilt on every resize
  const faceMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.65, side: THREE.DoubleSide, depthWrite: false,
  });
  const face = new THREE.Mesh(new THREE.ShapeGeometry(roundedRectShape(0.01, 0.01, PANEL_CORNER_R)), faceMat);
  group.add(face);

  // Border outline — closed line loop tracing the rounded shape
  const borderMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  const border = new THREE.LineLoop(new THREE.BufferGeometry(), borderMat);
  group.add(border);

  // Label (text texture)
  const labelMat = new THREE.MeshBasicMaterial({ transparent: true, depthWrite: false });
  const label = new THREE.Mesh(new THREE.PlaneGeometry(0.01, 0.01), labelMat);
  label.position.z = 0.003;
  group.add(label);

  // Panel state — recomputed by shrinkwrap()
  const panel = {
    name, group, face, faceMat, border, borderMat, label, labelMat,
    text, fontPx, paddingCm, maxWidthCm,
    textScale: 1.0,
    w: 0, h: 0,
    baselineCapHWorld: 0,
    hovered: false, sector: '', conflicts: [],
    get worldPos() { return group.position; },

    /** Re-render label canvas + label plane at current text/scale.
     *  Updates labelW, labelH, baselineCapHWorld. Frame UNTOUCHED. */
    renderLabel() {
      const effFontPx = this.fontPx * this.textScale;
      const maxW = this.maxWidthCm * 0.01 * LABEL_PPM;
      const measure = measureTextLines(this.text, effFontPx, maxW);

      const rendered = renderTextCanvas(measure, effFontPx);
      if (this.labelMat.map) this.labelMat.map.dispose();
      this.labelMat.map = new THREE.CanvasTexture(rendered.canvas);
      this.labelMat.map.colorSpace = THREE.SRGBColorSpace;
      this.labelMat.needsUpdate = true;

      const labelW = rendered.widthPx / LABEL_PPM;
      const labelH = rendered.heightPx / LABEL_PPM;
      this.label.geometry.dispose();
      this.label.geometry = new THREE.PlaneGeometry(labelW, labelH);

      this.labelW = labelW;
      this.labelH = labelH;
      this.baselineCapHWorld = effFontPx / LABEL_PPM;
    },

    /** Resize the frame to fit the current label + padding. Text UNTOUCHED. */
    shrinkwrap() {
      const padW = this.paddingCm * 0.01 * 2;
      this.w = this.labelW + padW;
      this.h = this.labelH + padW;
      rebuildFaceAndBorder(this);
    },

    setTextScale(s) {
      this.textScale = s;
      this.renderLabel();
      // Frame UNTOUCHED — call shrinkwrap() separately if you want it to refit.
    },

    setText(newText) {
      this.text = newText;
      this.renderLabel();
    },

    /** Force the frame to an explicit world size (cm). Doesn't touch the label;
     *  text stays at its measured size and may overflow visually. */
    setFixedFrameSize(wCm, hCm) {
      this.w = wCm * 0.01;
      this.h = hCm * 0.01;
      rebuildFaceAndBorder(this);
    },
  };

  // Initial state: render label, then shrinkwrap frame around it.
  panel.renderLabel();
  panel.shrinkwrap();
  return panel;
}

/**
 * Compute the apparent text size on the wearer's display.
 *
 *   distance     — Euclidean distance from camera origin to panel (meters)
 *   angularDeg   — vertical angular height of one cap, in degrees
 *   pixelHeight  — apparent cap height on display (px), assuming `ppd` pixels per degree
 *   status       — 'good' (>= 24 px), 'marginal' (14-23), 'poor' (< 14)
 *
 * Thresholds follow standard HMD readability guidance: 24+ px for body text,
 * 14-23 borderline, below 14 effectively unreadable on current AR optics.
 */
function getPanelTextMetrics(panel, ppd) {
  const p = panel.worldPos;
  const distance = Math.sqrt(p.x * p.x + p.y * p.y + p.z * p.z);
  // baselineCapHWorld is already scaled by current textScale (set in shrinkwrap)
  const capH = panel.baselineCapHWorld;
  const angularRad = 2 * Math.atan(capH / 2 / distance);
  const angularDeg = angularRad * 180 / Math.PI;
  const pixelHeight = angularDeg * ppd;
  const status = pixelHeight >= 24 ? 'good' : pixelHeight >= 14 ? 'marginal' : 'poor';
  return { distance, angularDeg, pixelHeight, status };
}

const READABILITY_TARGET_PX = 24;   // auto-fit aims for this

// Initial positions — clustered in angular space, spread in Z so the
// view-dependent nature of the overlap is obvious from orbit view.
const INITIAL_POSITIONS = [
  [-0.025,  0.020, -0.40],   // near
  [ 0.040,  0.000, -0.70],
  [-0.040, -0.025, -1.05],
  [ 0.025,  0.060, -1.40],   // far
];

// Sample content with high length variance: short label, status line,
// medium phrase, long sentence. Frames shrinkwrap to their text, so each
// panel ends up at a different world size.
const PANEL_SENTENCES = [
  "Hi",
  "Status: ready",
  "Calibrating six-joint kinematic chain",
  "Initiating diagnostic sequence. Running self-test on all six servos to verify alignment within tolerance before proceeding to the assembly phase.",
];

for (let i = 0; i < panelNames.length; i++) {
  const [x, y, z] = INITIAL_POSITIONS[i];
  panels.push(createPanel({
    name: panelNames[i],
    text: PANEL_SENTENCES[i],
    x, y, z,
    color: panelColors[i],
  }));
}

// ─── Cone projection + overlap detection ─────────────────────────────
function projectToAngular(pos) {
  const dx = pos.x, dy = pos.y, dz = -pos.z; // camera at origin looking -Z
  if (dz <= 0) return null;
  return {
    az: Math.atan2(dx, dz) / RAD,
    el: Math.atan2(dy, dz) / RAD,
    depth: Math.sqrt(dx*dx + dy*dy + dz*dz),
  };
}

function getSector(az, el) {
  const hT = H_FOV / 6, vT = V_FOV / 6;
  const col = az < -hT ? 0 : az > hT ? 2 : 1;
  const row = el > vT ? 0 : el < -vT ? 2 : 1;
  return SECTOR_NAMES[row * 3 + col];
}

function angularRect(panel) {
  const p = projectToAngular(panel.worldPos);
  if (!p) return null;
  const azExt = Math.atan2(panel.w / 2, -panel.worldPos.z) / RAD;
  const elExt = Math.atan2(panel.h / 2, -panel.worldPos.z) / RAD;
  return {
    ...p, name: panel.name,
    azMin: p.az - azExt, azMax: p.az + azExt,
    elMin: p.el - elExt, elMax: p.el + elExt,
  };
}

function detectOverlaps() {
  const rects = panels.map(angularRect).filter(Boolean);
  const overlaps = [];
  for (let i = 0; i < rects.length; i++) {
    for (let j = i + 1; j < rects.length; j++) {
      const a = rects[i], b = rects[j];
      if (a.azMin < b.azMax && a.azMax > b.azMin && a.elMin < b.elMax && a.elMax > b.elMin) {
        overlaps.push([a.name, b.name]);
      }
    }
  }
  return { rects, overlaps };
}

// ─── Conflict resolution ─────────────────────────────────────────────
const SECTOR_POS = {
  "TOP-LEFT": [-0.66, 0.66], "TOP": [0, 0.66], "TOP-RIGHT": [0.66, 0.66],
  "LEFT": [-0.66, 0], "CENTER": [0, 0], "RIGHT": [0.66, 0],
  "BOT-LEFT": [-0.66, -0.66], "BOTTOM": [0, -0.66], "BOT-RIGHT": [0.66, -0.66],
};
const ADJACENT = {
  "TOP-LEFT": ["TOP","LEFT"], "TOP": ["TOP-LEFT","TOP-RIGHT","CENTER"],
  "TOP-RIGHT": ["TOP","RIGHT"], "LEFT": ["TOP-LEFT","CENTER","BOT-LEFT"],
  "CENTER": ["TOP","LEFT","RIGHT","BOTTOM"], "RIGHT": ["TOP-RIGHT","CENTER","BOT-RIGHT"],
  "BOT-LEFT": ["LEFT","BOTTOM"], "BOTTOM": ["BOT-LEFT","CENTER","BOT-RIGHT"],
  "BOT-RIGHT": ["BOTTOM","RIGHT"],
};

let resolveActive = false;
const resolvedTargets = {};

function resolveConflicts() {
  // Screen-space overlap resolution — project panel rects to 2D angular
  // space, detect intersections, push apart by exact overlap amount.
  // Priority: first panel in array keeps position, others get pushed.

  const rects = panels.map(p => {
    const r = angularRect(p);
    return r ? { ...r, panel: p, pushX: 0, pushY: 0 } : null;
  }).filter(Boolean);

  // Iterative push (converges in ~5 passes for 4 elements)
  for (let pass = 0; pass < 8; pass++) {
    let anyPush = false;
    for (let i = 0; i < rects.length; i++) {
      for (let j = i + 1; j < rects.length; j++) {
        const a = rects[i], b = rects[j];
        const gapDeg = 1.0; // minimum angular gap

        const padDeg = 3.0; // padding between panels
        const overlapX = Math.min(a.azMax, b.azMax) - Math.max(a.azMin, b.azMin) + padDeg;
        const overlapY = Math.min(a.elMax, b.elMax) - Math.max(a.elMin, b.elMin) + padDeg;

        if (overlapX > 0 && overlapY > 0) {
          // Push along the axis with smaller overlap (cheaper resolution)
          if (overlapX < overlapY) {
            // Push horizontally
            const push = overlapX * 0.5;
            const sign = (a.az < b.az) ? -1 : 1;
            // Higher index = lower priority = gets pushed more
            b.pushX += -sign * push * 0.7;
            a.pushX += sign * push * 0.3;
          } else {
            // Push vertically
            const push = overlapY * 0.5;
            const sign = (a.el < b.el) ? -1 : 1;
            b.pushY += -sign * push * 0.7;
            a.pushY += sign * push * 0.3;
          }
          anyPush = true;
        }
      }
    }

    // Apply pushes to angular rects for next pass
    for (const r of rects) {
      r.az += r.pushX; r.el += r.pushY;
      r.azMin += r.pushX; r.azMax += r.pushX;
      r.elMin += r.pushY; r.elMax += r.pushY;
      r.pushX = 0; r.pushY = 0;
    }

    if (!anyPush) break;
  }

  // Convert resolved angular positions back to world positions
  for (const r of rects) {
    const depth = -r.panel.worldPos.z;
    const x = Math.tan(r.az * RAD) * depth;
    const y = Math.tan(r.el * RAD) * depth;
    resolvedTargets[r.panel.name] = new THREE.Vector3(x, y, r.panel.worldPos.z);
    r.panel.sector = getSector(r.az, r.el);
  }
}

// ─── Overlap volume meshes ───────────────────────────────────────
let overlapMeshes = [];
const overlapMat = new THREE.MeshBasicMaterial({
  color: 0xff2020, transparent: true, opacity: 0.12, side: THREE.DoubleSide, depthWrite: false,
});

function buildOverlapVolume(panelA, panelB) {
  // Compute angular rect intersection
  const rA = angularRect(panelA), rB = angularRect(panelB);
  if (!rA || !rB) return null;

  const azMin = Math.max(rA.azMin, rB.azMin);
  const azMax = Math.min(rA.azMax, rB.azMax);
  const elMin = Math.max(rA.elMin, rB.elMin);
  const elMax = Math.min(rA.elMax, rB.elMax);

  if (azMin >= azMax || elMin >= elMax) return null; // no overlap

  // Build frustum for the overlapping angular region
  const tanAzMin = Math.tan(azMin * RAD), tanAzMax = Math.tan(azMax * RAD);
  const tanElMin = Math.tan(elMin * RAD), tanElMax = Math.tan(elMax * RAD);
  const nearD = NEAR_PLANE;
  const farD = Math.max(-panelA.worldPos.z, -panelB.worldPos.z);

  const verts = [];
  for (const d of [nearD, farD]) {
    verts.push(
      new THREE.Vector3(tanAzMin * d, tanElMax * d, -d),
      new THREE.Vector3(tanAzMax * d, tanElMax * d, -d),
      new THREE.Vector3(tanAzMax * d, tanElMin * d, -d),
      new THREE.Vector3(tanAzMin * d, tanElMin * d, -d),
    );
  }

  const positions = [];
  function tri(a, b, c) { positions.push(a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z); }
  tri(verts[0], verts[1], verts[2]); tri(verts[0], verts[2], verts[3]);
  tri(verts[4], verts[6], verts[5]); tri(verts[4], verts[7], verts[6]);
  tri(verts[0], verts[5], verts[1]); tri(verts[0], verts[4], verts[5]);
  tri(verts[3], verts[2], verts[6]); tri(verts[3], verts[6], verts[7]);
  tri(verts[0], verts[3], verts[7]); tri(verts[0], verts[7], verts[4]);
  tri(verts[1], verts[5], verts[6]); tri(verts[1], verts[6], verts[2]);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  return new THREE.Mesh(geo, overlapMat.clone());
}

function updateOverlapVolumes() {
  for (const m of overlapMeshes) { scene.remove(m); m.geometry.dispose(); }
  overlapMeshes = [];

  const { overlaps } = detectOverlaps();
  for (const [aName, bName] of overlaps) {
    const a = panels.find(p => p.name === aName);
    const b = panels.find(p => p.name === bName);
    if (a && b) {
      const mesh = buildOverlapVolume(a, b);
      if (mesh) {
        scene.add(mesh);
        overlapMeshes.push(mesh);
      }
    }
  }
}

// ─── Panel cone highlight mesh ───────────────────────────────────
let panelConeMesh = null;
const panelConeMat = new THREE.MeshBasicMaterial({
  color: 0xe03020, transparent: true, opacity: 0.06, side: THREE.DoubleSide, depthWrite: false,
});

function buildPanelCone(nearCorners, farCorners) {
  if (panelConeMesh) { scene.remove(panelConeMesh); panelConeMesh.geometry.dispose(); }

  const n = nearCorners, f = farCorners;
  const positions = [];
  function tri(a, b, c) { positions.push(a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z); }

  // Near face
  tri(n[0], n[1], n[2]); tri(n[0], n[2], n[3]);
  // Far face (panel surface)
  tri(f[0], f[2], f[1]); tri(f[0], f[3], f[2]);
  // Top
  tri(n[0], f[1], n[1]); tri(n[0], f[0], f[1]);
  // Bottom
  tri(n[3], n[2], f[2]); tri(n[3], f[2], f[3]);
  // Left
  tri(n[0], n[3], f[3]); tri(n[0], f[3], f[0]);
  // Right
  tri(n[1], f[1], f[2]); tri(n[1], f[2], n[2]);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  panelConeMesh = new THREE.Mesh(geo, panelConeMat);
  scene.add(panelConeMesh);
}

// ─── Raycaster for hover ─────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPanel = null;

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

// ─── Inspector + tween system (slow-motion + logging) ───────────────
// `inspect.verbose` is the master switch. When on:
//   - position changes lerp at a slower rate so they're easy to follow
//   - frame/text changes animate via tween() instead of snapping
//   - each op logs to the on-screen ops-log panel
//   - runSequence awaits each step's animation + a configurable inter-step gap
// When off, ops snap and runSequence runs straight through (existing behavior).

const inspect = {
  verbose: false,
  stepDelayMs: 600,        // pause between sequence steps
  animDurationMs: 600,     // duration of each animated transition
  positionLerpFast: 0.05,  // existing per-frame lerp factor (snappy)
  positionLerpSlow: 0.012, // verbose-mode lerp factor (~4× slower)
};

const _tweens = [];
function tween({ duration, ease = (t) => 1 - Math.pow(1 - t, 3), onUpdate }) {
  return new Promise(resolve => {
    const tw = {
      start: performance.now(),
      tick(now) {
        const u = Math.min(1, (now - this.start) / duration);
        onUpdate(ease(u));
        if (u >= 1) { resolve(); return false; }
        return true;
      },
    };
    _tweens.push(tw);
  });
}
function tickTweens(now) {
  for (let i = _tweens.length - 1; i >= 0; i--) {
    if (!_tweens[i].tick(now)) _tweens.splice(i, 1);
  }
}

const _logEl = () => document.getElementById('ops-log');
function logOp(opName, args) {
  const el = _logEl();
  if (!el) return;
  // Mark previously-current step as past
  for (const r of el.querySelectorAll('.op-current')) r.classList.remove('op-current');
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false }).split(' ')[0];
  const argsStr = args && Object.keys(args).length
    ? ' <span class="op-args">' + JSON.stringify(args) + '</span>'
    : '';
  const row = document.createElement('div');
  row.className = 'op-row op-current';
  row.innerHTML = `<span class="op-time">${ts}</span> <span class="op-name">${opName}</span>${argsStr}`;
  el.appendChild(row);
  while (el.children.length > 24) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
  if (inspect.verbose) console.log(`[ops] ${opName}`, args || {});
}

/** Helper: run an animation if verbose, snap if not. Returns Promise<void>. */
function maybeAnimate(snap, animator) {
  if (inspect.verbose && inspect.animDurationMs > 0) {
    return animator(inspect.animDurationMs);
  }
  snap();
  return Promise.resolve();
}

// ─── Layout ops registry ─────────────────────────────────────────────
// Each op is a self-describing record: { description, args, apply(ctx, args) }
// `apply` mutates state in place and returns an `undo` function capturing
// the prior state. Use cases:
//   - rewire GUI buttons through a single contract
//   - call ops directly from the console for ad-hoc layout passes
//   - hand `ops` (with descriptions + arg schemas) to an LLM tool spec so
//     an agent can compose view-aware passes on dynamically populated UI
//
// The intended canonical macro is fitReadability → shrinkwrapAll →
// resolveOverlaps: scale text to legible, refit frames, then push apart.
// Each step is reversible; the macro itself is reversible because
// runSequence collects every undo.

const DEFAULT_FRAME_SIZE_CM = { w: 20, h: 8 };

const ctx = {
  panels,
  initialPositions: INITIAL_POSITIONS,
  resolveConflicts,
  resolvedTargets,
  setResolveActive: (v) => { resolveActive = v; },
  cam,                   // exposes .ppd live
  readabilityTargetPx: READABILITY_TARGET_PX,
};

// Animator helpers — used by ops to interpolate frame/text changes when verbose.
function animateFrameSize(panels, beforeWH, afterWH, duration) {
  return tween({
    duration,
    onUpdate: (t) => {
      for (let i = 0; i < panels.length; i++) {
        const w = beforeWH[i].w + (afterWH[i].w - beforeWH[i].w) * t;
        const h = beforeWH[i].h + (afterWH[i].h - beforeWH[i].h) * t;
        panels[i].setFixedFrameSize(w * 100, h * 100);
      }
    },
  });
}
function animateTextScale(panels, beforeScales, afterScales, duration) {
  return tween({
    duration,
    onUpdate: (t) => {
      for (let i = 0; i < panels.length; i++) {
        const s = beforeScales[i] + (afterScales[i] - beforeScales[i]) * t;
        panels[i].setTextScale(s);
      }
    },
  });
}

const ops = {
  resolveOverlaps: {
    description: "Iteratively push panels apart in angular space until no view-dependent overlaps remain.",
    args: {},
    apply(c) {
      logOp('resolveOverlaps');
      const before = c.panels.map(p => p.worldPos.clone());
      c.setResolveActive(true);
      c.resolveConflicts();
      // Position transitions are handled by the existing resolvedTargets lerp.
      // In verbose mode the lerp factor is slowed; we just wait a duration that
      // covers the visible motion.
      const done = inspect.verbose
        ? new Promise(r => setTimeout(r, inspect.animDurationMs * 1.5))
        : Promise.resolve();
      const undo = () => {
        c.setResolveActive(false);
        for (let i = 0; i < c.panels.length; i++) c.panels[i].group.position.copy(before[i]);
      };
      return { undo, done };
    },
  },

  resetPositions: {
    description: "Restore every panel to its initial position from the layout's INITIAL_POSITIONS.",
    args: {},
    apply(c) {
      logOp('resetPositions');
      const before = c.panels.map(p => p.worldPos.clone());
      c.setResolveActive(false);
      const after = c.initialPositions.map(([x, y, z]) => new THREE.Vector3(x, y, z));
      for (const k in c.resolvedTargets) c.resolvedTargets[k] = null;
      const done = maybeAnimate(
        () => after.forEach((v, i) => c.panels[i].group.position.copy(v)),
        (dur) => tween({
          duration: dur,
          onUpdate: (t) => {
            for (let i = 0; i < c.panels.length; i++) {
              c.panels[i].group.position.lerpVectors(before[i], after[i], t);
            }
          },
        })
      );
      return {
        undo: () => before.forEach((v, i) => c.panels[i].group.position.copy(v)),
        done,
      };
    },
  },

  shrinkwrapAll: {
    description: "Resize every panel frame to fit current text content + padding. Idempotent.",
    args: {},
    apply(c) {
      logOp('shrinkwrapAll');
      const before = c.panels.map(p => ({ w: p.w, h: p.h }));
      // Compute target dims (shrinkwrap mutates in place)
      c.panels.forEach(p => p.shrinkwrap());
      const after = c.panels.map(p => ({ w: p.w, h: p.h }));
      // If animating, restore to before then tween to after
      if (inspect.verbose && inspect.animDurationMs > 0) {
        c.panels.forEach((p, i) => p.setFixedFrameSize(before[i].w * 100, before[i].h * 100));
      }
      const done = maybeAnimate(
        () => {},   // already at target
        (dur) => animateFrameSize(c.panels, before, after, dur)
      );
      return {
        undo: () => c.panels.forEach((p, i) => p.setFixedFrameSize(before[i].w * 100, before[i].h * 100)),
        done,
      };
    },
  },

  setUniformFrames: {
    description: "Set every panel frame to the same explicit size in cm.",
    args: { wCm: { type: 'number', default: 20 }, hCm: { type: 'number', default: 8 } },
    apply(c, { wCm = 20, hCm = 8 } = {}) {
      logOp('setUniformFrames', { wCm, hCm });
      const before = c.panels.map(p => ({ w: p.w, h: p.h }));
      const targetW = wCm * 0.01, targetH = hCm * 0.01;
      const after = c.panels.map(() => ({ w: targetW, h: targetH }));
      const done = maybeAnimate(
        () => c.panels.forEach(p => p.setFixedFrameSize(wCm, hCm)),
        (dur) => animateFrameSize(c.panels, before, after, dur)
      );
      return {
        undo: () => c.panels.forEach((p, i) => p.setFixedFrameSize(before[i].w * 100, before[i].h * 100)),
        done,
      };
    },
  },

  fitReadability: {
    description: "Scale each panel's text to hit a target on-screen pixel height. View-aware: uses current Display PPD and per-panel distance from camera.",
    args: { targetPx: { type: 'number', default: 24, min: 8, max: 120 } },
    apply(c, { targetPx = 24 } = {}) {
      logOp('fitReadability', { targetPx });
      const before = c.panels.map(p => p.textScale);
      const after = c.panels.map(p => {
        const m = getPanelTextMetrics(p, c.cam.ppd);
        const ratio = targetPx / m.pixelHeight;
        return Math.max(0.3, Math.min(3.0, p.textScale * ratio));
      });
      const done = maybeAnimate(
        () => c.panels.forEach((p, i) => p.setTextScale(after[i])),
        (dur) => animateTextScale(c.panels, before, after, dur)
      );
      return {
        undo: () => c.panels.forEach((p, i) => p.setTextScale(before[i])),
        done,
      };
    },
  },

  setUniformTextScale: {
    description: "Set every panel's text scale to the same multiplier (1.0 = baseline font size).",
    args: { scale: { type: 'number', default: 1.0, min: 0.3, max: 3.0 } },
    apply(c, { scale = 1.0 } = {}) {
      logOp('setUniformTextScale', { scale });
      const before = c.panels.map(p => p.textScale);
      const after = c.panels.map(() => scale);
      const done = maybeAnimate(
        () => c.panels.forEach(p => p.setTextScale(scale)),
        (dur) => animateTextScale(c.panels, before, after, dur)
      );
      return {
        undo: () => c.panels.forEach((p, i) => p.setTextScale(before[i])),
        done,
      };
    },
  },

  resetTextScale: {
    description: "Restore every panel's text scale to 1.0 (baseline).",
    args: {},
    apply(c) {
      logOp('resetTextScale');
      const before = c.panels.map(p => p.textScale);
      const after = c.panels.map(() => 1.0);
      const done = maybeAnimate(
        () => c.panels.forEach(p => p.setTextScale(1.0)),
        (dur) => animateTextScale(c.panels, before, after, dur)
      );
      return {
        undo: () => c.panels.forEach((p, i) => p.setTextScale(before[i])),
        done,
      };
    },
  },

  setPanelText: {
    description: "Replace a panel's text content by index. Re-renders the label, leaves frame and scale alone.",
    args: { index: { type: 'number' }, text: { type: 'string' } },
    apply(c, { index, text }) {
      logOp('setPanelText', { index, text });
      const p = c.panels[index];
      const before = p.text;
      p.setText(text);
      return {
        undo: () => p.setText(before),
        done: Promise.resolve(),
      };
    },
  },
};

/**
 * Run an ordered list of op invocations. Async; awaits each step's animation
 * (in verbose mode) and inserts a configurable gap between steps so a viewer
 * can follow what's happening.
 *
 * Returns Promise<undo>. The resolved undo() walks every step's inverse in
 * reverse order, ignoring the verbose pacing.
 *
 * Each step is `{ op: 'name', args?: {...} }`.
 */
async function runSequence(c, steps) {
  const undos = [];
  for (let i = 0; i < steps.length; i++) {
    const step = steps[i];
    const op = ops[step.op];
    if (!op) throw new Error(`runSequence: unknown op '${step.op}'`);
    const { undo, done } = op.apply(c, step.args || {});
    undos.push(undo);
    await done;
    if (inspect.verbose && i < steps.length - 1 && inspect.stepDelayMs > 0) {
      await new Promise(r => setTimeout(r, inspect.stepDelayMs));
    }
  }
  return () => { for (let i = undos.length - 1; i >= 0; i--) undos[i] && undos[i](); };
}

// Expose for direct invocation from console / external callers / AI agents.
//   await window.runSequence([{ op: 'fitReadability', args: { targetPx: 24 } }, { op: 'shrinkwrapAll' }, { op: 'resolveOverlaps' }]);
window.layoutOps = ops;
window.layoutCtx = ctx;
window.runSequence = (steps) => runSequence(ctx, steps);

// 2. Camera (Spectacles) — every intrinsic of the simulated wearer's eye.
const camFolder = pane.addFolder({ title: 'Camera (Spectacles)' });
camFolder.addBinding(cam, 'near', { min: 0.01, max: 0.3, step: 0.01, label: 'Near Plane' })
  .on('change', (e) => { NEAR_PLANE = e.value; buildConeOutlines(params.coneDepth); updateSceneCamera(); });
camFolder.addBinding(params, 'coneDepth', { min: 0.3, max: 1.5, step: 0.05, label: 'Far Plane' })
  .on('change', (e) => { buildConeOutlines(e.value); buildDepthRuler(e.value); });
camFolder.addBinding(cam, 'hFov', { min: 20, max: 120, step: 1, label: 'H-FOV°' })
  .on('change', (e) => { H_FOV = e.value; buildConeOutlines(params.coneDepth); updateSceneCamera(); });
camFolder.addBinding(cam, 'vFov', { min: 15, max: 90, step: 1, label: 'V-FOV°' })
  .on('change', (e) => { V_FOV = e.value; buildConeOutlines(params.coneDepth); updateSceneCamera(); });
camFolder.addBinding(cam, 'ppd', { min: 10, max: 80, step: 1, label: 'Display PPD' });

// 3. Layout Actions — every named op that operates on all panels, paired with
//    its inverse so do/undo are always adjacent.
const actionsFolder = pane.addFolder({ title: 'Layout Actions' });
actionsFolder.addButton({ title: 'Resolve Overlaps' }).on('click', guiOp('resolveOverlaps'));
actionsFolder.addButton({ title: '↺ Reset Positions' }).on('click', guiOp('resetPositions'));
actionsFolder.addButton({ title: 'Shrinkwrap to Text' }).on('click', guiOp('shrinkwrapAll'));
actionsFolder.addButton({ title: '↺ Reset Frame Sizes' }).on('click',
  guiOp('setUniformFrames', { wCm: DEFAULT_FRAME_SIZE_CM.w, hCm: DEFAULT_FRAME_SIZE_CM.h }));
actionsFolder.addButton({ title: `Auto-fit Text to ${READABILITY_TARGET_PX} px` }).on('click',
  guiOp('fitReadability', { targetPx: READABILITY_TARGET_PX }));
actionsFolder.addButton({ title: '↺ Reset Text Sizes' }).on('click', guiOp('resetTextScale'));

// 4. Panel Text Size — fine-grained per-panel scale sliders.
const textFolder = pane.addFolder({ title: 'Panel Text Size' });
for (const p of panels) {
  const proxy = { scale: 1.0 };
  const ctl = textFolder.addBinding(proxy, 'scale', { min: 0.3, max: 3.0, step: 0.05, label: p.name });
  ctl.on('change', (e) => p.setTextScale(e.value));
  textControllers.push({ panel: p, ctl, proxy });
}

// 5. View Camera — the orbit camera you inspect the scene with (NOT the wearer's eye).
const viewFolder = pane.addFolder({ title: 'View Camera (orbit)' });
const viewParams = { ortho: false, fov: camera.fov };
viewFolder.addBinding(viewParams, 'ortho', { label: 'Orthographic' }).on('change', (e) => {
  if (e.value) {
    const d = camera.position.length();
    const aspect = innerWidth / innerHeight;
    const h = d * Math.tan(camera.fov / 2 * RAD);
    orthoCamera = new THREE.OrthographicCamera(-h * aspect, h * aspect, h, -h, 0.01, 100);
    orthoCamera.position.copy(camera.position);
    orthoCamera.quaternion.copy(camera.quaternion);
    controls.object = orthoCamera;
    useOrtho = true;
  } else {
    controls.object = camera;
    useOrtho = false;
  }
});
viewFolder.addBinding(viewParams, 'fov', { min: 20, max: 120, step: 1, label: 'View FOV' })
  .on('change', (e) => { camera.fov = e.value; camera.updateProjectionMatrix(); });

// 6. Inspector — verbose mode + slow-motion pacing for debugging ops.
const inspectFolder = pane.addFolder({ title: 'Inspector', expanded: false });
inspectFolder.addBinding(inspect, 'verbose', { label: 'Verbose / Slow Motion' });
inspectFolder.addBinding(inspect, 'stepDelayMs', { min: 0, max: 2000, step: 50, label: 'Step Delay (ms)' });
inspectFolder.addBinding(inspect, 'animDurationMs', { min: 0, max: 2000, step: 50, label: 'Anim Duration (ms)' });
inspectFolder.addButton({ title: 'Clear Log' }).on('click', () => {
  const el = document.getElementById('ops-log');
  if (el) el.innerHTML = '';
});

// Initial build
buildConeOutlines(params.coneDepth);
buildAllSectors(params.coneDepth);
buildDepthRuler(params.coneDepth);

// ─── Draw connection lines from camera to panels ─────────────────────
const connectionLines = [];
for (let i = 0; i < 4; i++) {
  const geo = new THREE.BufferGeometry();
  const mat = new THREE.LineBasicMaterial({ color: panelColors[i], transparent: true, opacity: 0.3 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  connectionLines.push(line);
}

// ─── Animate ─────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  // Hover detection
  raycaster.setFromCamera(mouse, camera);
  const faces = panels.map(p => p.face);
  const hits = raycaster.intersectObjects(faces);
  const prevHovered = hoveredPanel;
  hoveredPanel = null;
  if (hits.length > 0) {
    for (const panel of panels) {
      if (panel.face === hits[0].object) { hoveredPanel = panel; break; }
    }
  }

  // Update panel visuals
  for (const panel of panels) {
    const isHov = panel === hoveredPanel;
    panel.borderMat.opacity = isHov ? 1.0 : 0.4;
    panel.borderMat.color.set(isHov ? 0xffffff : 0x888888);
    panel.faceMat.opacity = isHov ? 0.8 : 0.5;
  }

  // Highlight: exact angular footprint of hovered panel as frustum slice
  if (panelConeMesh) { panelConeMesh.visible = false; }
  if (hoveredPanel) {
    const pos = hoveredPanel.worldPos;
    const hw = hoveredPanel.w / 2, hh = hoveredPanel.h / 2;
    const panelDepth = -pos.z;
    if (panelDepth > 0.05) {
      // Panel corners in world space
      const corners = [
        new THREE.Vector3(pos.x - hw, pos.y + hh, pos.z),
        new THREE.Vector3(pos.x + hw, pos.y + hh, pos.z),
        new THREE.Vector3(pos.x + hw, pos.y - hh, pos.z),
        new THREE.Vector3(pos.x - hw, pos.y - hh, pos.z),
      ];
      // Project corners as rays from origin, find near-plane intersections
      const nearCorners = corners.map(c => {
        const dir = c.clone().normalize();
        return dir.multiplyScalar(NEAR_PLANE / (-dir.z || 0.001) * -1);
      });
      // Build frustum: 4 near corners + 4 panel corners
      buildPanelCone(nearCorners, corners);
      panelConeMesh.visible = true;
    }
  }

  // Overlap detection
  const { rects, overlaps } = detectOverlaps();
  for (const panel of panels) panel.conflicts = [];
  for (const [a, b] of overlaps) {
    const pa = panels.find(p => p.name === a);
    const pb = panels.find(p => p.name === b);
    if (pa) pa.conflicts.push(b);
    if (pb) pb.conflicts.push(a);
  }

  // Red border on conflicting panels
  for (const panel of panels) {
    if (panel.conflicts.length > 0 && panel !== hoveredPanel) {
      panel.borderMat.color.set(0xe03020);
      panel.borderMat.opacity = 0.9;
    }
  }

  // Update overlap frustum volumes
  updateOverlapVolumes();

  // Smooth move toward resolved targets. Verbose mode slows the lerp so
  // each push-apart step is visible.
  if (resolveActive) {
    const k = inspect.verbose ? inspect.positionLerpSlow : inspect.positionLerpFast;
    for (const panel of panels) {
      const target = resolvedTargets[panel.name];
      if (target) {
        panel.group.position.lerp(target, k);
      }
    }
  }
  tickTweens(performance.now());

  // Update connection lines
  for (let i = 0; i < panels.length; i++) {
    const pts = [new THREE.Vector3(0,0,0), panels[i].worldPos.clone()];
    connectionLines[i].geometry.dispose();
    connectionLines[i].geometry = new THREE.BufferGeometry().setFromPoints(pts);
  }

  // Stats — sector + readability per panel
  const STATUS_COLOR = { good: '#6cdc8c', marginal: '#c85020', poor: '#e03020' };
  const rows = panels.map(p => {
    const proj = projectToAngular(p.worldPos);
    const sector = proj ? getSector(proj.az, proj.el) : '?';
    const m = getPanelTextMetrics(p, cam.ppd);
    const dCm = (m.distance * 100).toFixed(0);
    const px = m.pixelHeight.toFixed(0);
    const color = STATUS_COLOR[m.status];
    return `<span style="opacity:0.7">${p.name}</span> ${sector}` +
           ` <span style="opacity:0.5">·</span> ${dCm}cm` +
           ` <span style="opacity:0.5">·</span> <span style="color:${color}">${px}px ${m.status}</span>`;
  });
  const ppdNote = `<span style="opacity:0.5;font-size:9px">${cam.ppd} ppd · target ${READABILITY_TARGET_PX}px</span>`;
  document.getElementById('stats').innerHTML = rows.join('<br>') + '<br>' + ppdNote;
  document.getElementById('overlap-log').innerHTML = overlaps.length > 0
    ? '<span style="color:var(--red)">OVERLAPS:</span><br>' + overlaps.map(([a,b]) => `${a} x ${b}`).join('<br>')
    : '<span style="color:#4a4">No overlaps</span>';

  controls.update();
  gnomon.update();
  const activeCam = useOrtho && orthoCamera ? orthoCamera : camera;
  if (useOrtho && orthoCamera) {
    orthoCamera.position.copy(controls.object.position);
    orthoCamera.quaternion.copy(controls.object.quaternion);
  }
  renderer.render(scene, activeCam);

  // Inset preview: what the scene camera actually sees
  // Hide debug visuals (cone outlines, overlap volumes, connection lines, ruler)
  coneGroup.visible = false;
  rulerGroup.visible = false;
  if (panelConeMesh) panelConeMesh.visible = false;
  for (const m of overlapMeshes) m.visible = false;
  for (const l of connectionLines) l.visible = false;

  previewRenderer.render(scene, sceneCamera);

  // Restore
  coneGroup.visible = true;
  rulerGroup.visible = true;
  for (const l of connectionLines) l.visible = true;
}
animate();
</script>
</body>
